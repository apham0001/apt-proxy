  - id: centos
    name: CentOS
    type: 4
    url_pattern: "/centos/(.+)$"
    benchmark_url: "TIME"
    cache_rules:
      - pattern: "repomd.xml$"
        cache_control: "max-age=3600"
        rewrite: true
      - pattern: "filelist.gz$"
        cache_control: "max-age=3600"
        rewrite: true
      - pattern: "dir_sizes$"
        cache_control: "max-age=3600"
        rewrite: true
      - pattern: "TIME$"
        cache_control: "max-age=3600"
        rewrite: true
      - pattern: "timestamp.txt$"
        cache_control: "max-age=3600"
        rewrite: true
      - pattern: ".*"
        cache_control: "max-age=100000"
        rewrite: true
    mirrors:
      official:
        - "http://mirror.centos.org/centos/"
        - "http://centos.mirrors.ovh.net/ftp.centos.org/"
        - "http://centos.mirrors.proxad.net/centos/"
