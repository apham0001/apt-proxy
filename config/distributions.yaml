        cache_control: "max-age=3600"
        rewrite: true
      - pattern: "filelist.gz$"
        cache_control: "max-age=3600"
        rewrite: true
      - pattern: "dir_sizes$"
        cache_control: "max-age=3600"
        rewrite: true
      - pattern: "timestamp.txt$"
        cache_control: "max-age=3600"
        rewrite: true
      - pattern: ".*"
        cache_control: "max-age=100000"
        rewrite: true
    mirrors:
      official:
        - "https://dl.rockylinux.org/pub/rocky/"
        - "https://rockylinux.mirrors.ovh.net/"
        - "https://mirror.rackspace.com/rocky/"
      custom: []

  - id: fedora
    name: Fedora
    type: 8
    url_pattern: "/fedora/(.+)$"
    benchmark_url: "releases/"
    cache_rules:
      - pattern: "repodata/.*\\.(xml|xml.gz|xml.xz|json)$"
        cache_control: "max-age=3600"
        rewrite: true
      - pattern: "Packages/.*\\.rpm$"
        cache_control: "max-age=86400"
        rewrite: true
      - pattern: ".*timestamp.txt$"
        cache_control: "max-age=3600"
        rewrite: true
      - pattern: ".*"
        cache_control: "max-age=3600"
        rewrite: true
    mirrors:
      official:
        - "https://mirrors.ircam.fr/pub/fedora/linux/"
        - "https://mirror.in2p3.fr/linux/fedora/"
        - "https://ftp.lip6.fr/pub/linux/distributions/fedora/"
      custom: []
