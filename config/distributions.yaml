  - id: alpine
    name: Alpine Linux
    type: 5
    url_pattern: "/alpine/(.+)$"
    benchmark_url: "MIRRORS.txt"
    cache_rules:
      - pattern: "APKINDEX.tar.gz$"
        cache_control: "max-age=3600"
        rewrite: true
      - pattern: "tar.gz$"
        cache_control: "max-age=3600"
        rewrite: true
      - pattern: "apk$"
        cache_control: "max-age=3600"
        rewrite: true
      - pattern: ".*"
        cache_control: "max-age=100000"
        rewrite: true
    mirrors:
      official:
        - "http://dl-cdn.alpinelinux.org/alpine/"
        - "http://mirrors.ircam.fr/pub/alpine/"
        - "https://uk.alpinelinux.org/alpine/"
