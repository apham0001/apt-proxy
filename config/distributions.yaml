distributions:
  - id: ubuntu
    name: Ubuntu
    type: 1
    url_pattern: "/ubuntu/(.+)$"
    benchmark_url: "dists/noble/main/binary-amd64/Release"
    geo_mirror_api: "http://mirrors.ubuntu.com/mirrors.txt"
    cache_rules:
      - pattern: "deb$"
        cache_control: "max-age=100000"
        rewrite: true
      - pattern: "udeb$"
        cache_control: "max-age=100000"
        rewrite: true
      - pattern: "InRelease$"
        cache_control: "max-age=3600"
        rewrite: true
      - pattern: "DiffIndex$"
        cache_control: "max-age=3600"
        rewrite: true
      - pattern: "PackagesIndex$"
        cache_control: "max-age=3600"
        rewrite: true
      - pattern: "Packages\\.(bz2|gz|lzma)$"
        cache_control: "max-age=3600"
        rewrite: true
      - pattern: "SourcesIndex$"
        cache_control: "max-age=3600"
        rewrite: true
      - pattern: "Sources\\.(bz2|gz|lzma)$"
        cache_control: "max-age=3600"
        rewrite: true
      - pattern: "Release(\\.gpg)?$"
        cache_control: "max-age=3600"
        rewrite: true
      - pattern: "Translation-(en|fr)\\.(gz|bz2|bzip2|lzma)$"
        cache_control: "max-age=3600"
        rewrite: true
      - pattern: "/by-hash/"
        cache_control: "max-age=3600"
        rewrite: true
    mirrors:
      official:
        - "http://fr.archive.ubuntu.com/ubuntu/"
        - "http://mirrors.ircam.fr/pub/ubuntu/"
        - "http://ubuntu.mirrors.ovh.net/ubuntu/"
      custom: []

  - id: ubuntu-ports
    name: Ubuntu Ports
    type: 2
    url_pattern: "/ubuntu-ports/(.+)$"
    benchmark_url: "dists/noble/InRelease"
    cache_rules:
      - pattern: "deb$"
        cache_control: "max-age=100000"
        rewrite: true
      - pattern: "udeb$"
        cache_control: "max-age=100000"
        rewrite: true
      - pattern: "InRelease$"
        cache_control: "max-age=3600"
        rewrite: true
      - pattern: "DiffIndex$"
        cache_control: "max-age=3600"
        rewrite: true
      - pattern: "PackagesIndex$"
        cache_control: "max-age=3600"
        rewrite: true
      - pattern: "Packages\\.(bz2|gz|lzma)$"
        cache_control: "max-age=3600"
        rewrite: true
      - pattern: "SourcesIndex$"
        cache_control: "max-age=3600"
        rewrite: true
      - pattern: "Sources\\.(bz2|gz|lzma)$"
        cache_control: "max-age=3600"
        rewrite: true
      - pattern: "Release(\\.gpg)?$"
        cache_control: "max-age=3600"
        rewrite: true
      - pattern: "Translation-(en|fr)\\.(gz|bz2|bzip2|lzma)$"
        cache_control: "max-age=3600"
        rewrite: true
      - pattern: "/by-hash/"
        cache_control: "max-age=3600"
        rewrite: true
    mirrors:
      official:
        - "http://ports.ubuntu.com/ubuntu-ports/"
        - "https://mirrors.dotsrc.org/ubuntu-ports/"
        - "http://mirror.yandex.ru/ubuntu-ports/"
      custom: []

